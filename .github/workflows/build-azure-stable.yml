name: Build & Publish APK — Azure Stable (v11.83)

on:
  push:
    branches: [ azure-stable ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/v2retail.keystore
          UNSIGNED=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "Signing: $UNSIGNED"
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks /tmp/v2retail.keystore \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --out V2_HHT_Azure_Stable.apk \
            "$UNSIGNED"
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner verify V2_HHT_Azure_Stable.apk
          echo "APK size: $(du -sh V2_HHT_Azure_Stable.apk)"

      - name: Upload APK to R2 (stable slot)
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          pip install boto3 -q
          python3 << 'PYEOF'
          import boto3, os
          from botocore.config import Config
          s3 = boto3.client("s3",
              endpoint_url=os.environ["R2_ENDPOINT"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY"],
              aws_secret_access_key=os.environ["R2_SECRET_KEY"],
              config=Config(signature_version="s3v4"), region_name="auto"
          )
          with open("V2_HHT_Azure_Stable.apk", "rb") as f:
              s3.upload_fileobj(f, "v2retail", "V2_HHT_Azure_Stable.apk",
                  ExtraArgs={"ContentType":"application/vnd.android.package-archive","CacheControl":"no-cache"})
          print("Uploaded to R2: v2retail/V2_HHT_Azure_Stable.apk")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: azure-stable-${{ github.run_number }}
          name: 'V2 HHT Azure Stable v11.83 — Build ${{ github.run_number }}'
          files: V2_HHT_Azure_Stable.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
