name: Build V2 HHT APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles("**/*.gradle*") }}

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Find APK
        run: |
          find app/build/outputs/apk -name "*.apk"
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" V2_HHT_Azure_Release.apk
          echo "APK=$(pwd)/V2_HHT_Azure_Release.apk" >> $GITHUB_ENV
          du -sh V2_HHT_Azure_Release.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: V2-HHT-Azure-Release
          path: V2_HHT_Azure_Release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v12.098-azure-${{ github.run_number }}
          name: "V2 HHT v12.098 — Azure Build #${{ github.run_number }}"
          files: V2_HHT_Azure_Release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
