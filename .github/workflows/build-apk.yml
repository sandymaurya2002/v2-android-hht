name: Build V2 HHT APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > V2Retail_at_456_keystore
          echo "Keystore decoded"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Rename and verify APK
        run: |
          ls -lh app/release/
          # AGP signing config in build.gradle already produces a signed APK
          cp app/release/app-release.apk app/release/V2_HHT_Azure_Release.apk
          echo "✅ APK ready: $(du -sh app/release/V2_HHT_Azure_Release.apk)"
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner verify \
            app/release/V2_HHT_Azure_Release.apk && echo "✅ APK signature verified"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2-HHT-Azure-Release
          path: app/release/V2_HHT_Azure_Release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "v11.83-azure-${{ github.run_number }}"
          name: "V2 HHT v11.83 — Azure Migration Build #${{ github.run_number }}"
          body: |
            ## V2 HHT Android App — Azure Migration Release

            ### What changed
            - ✅ Server URL updated to Azure (`v2-hht-api.azurewebsites.net`)
            - ✅ Azure Prod added as default option in server dropdown
            - ✅ Fixed hardcoded old server IP in Delivery Update screen
            - ✅ Fixed crash bug in SharedPreferences null check
            - ✅ HTTPS enforced for Azure connections
            - ✅ targetSdkVersion bumped to 34

            ### Install
            Download `V2_HHT_Azure_Release.apk` below and install on HHT devices.
            Select **"Azure Prod"** from the server dropdown.
          artifacts: "app/release/V2_HHT_Azure_Release.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          makeLatest: true
